<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./static/css/signup_signin.css">
</head>

<body>
    <div class="bg"></div>
    <div class="form-wrapper">
        <form id="loginForm">
            <h2>Welcome Back</h2>

            <div class="form-control">
                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required
                >
            </div>

            <div class="form-control">
                <label for="password">Password</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    required
                >
            </div>
            <button type="submit">
                Sign in 
            </button>
            <p>
                No account?
                <a href="./register.html">
                    Sign up
                </a>
            </p>
        </form>
    </div>
    <script src="./static/js/login.js"></script>

</body>
</html>

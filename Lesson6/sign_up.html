<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Buổi 6</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #eef2f3;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .form-card {
        background: #fff;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 350px;
      }
      h2 {
        text-align: center;
        color: #333;
        margin-bottom: 1.5rem;
      }
      .input-group {
        margin-bottom: 1rem;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
        color: #555;
      }
      input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
        outline: none;
        transition: 0.3s;
      }
      input:focus {
        border-color: #007bff;
        box-shadow: 0 0 5px rgba(0, 123, 255, 0.2);
      }
      button {
        width: 100%;
        padding: 12px;
        background: #007bff;
        border: none;
        color: white;
        border-radius: 6px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 1rem;
      }
    
      button:hover {
        background: #0056b3;
      }
      .switch-link {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
      }
      .switch-link a {
        color: #007bff;
        text-decoration: none;
      }
    </style>
  </head>   
  <body> 
    <div class="form-card">
      <h2>SIGN UP</h2>
      <form action="#" method="POST">
        <div class="input-group"> 
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Username"
            required
          />
        </div>

        <div class="input-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="example@gmail.com"
            required
          />   
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Password"
            required
          />
        </div>
      </form>
      <button type="submit">Sign up</button>
              <div class="switch-link">
        Already have an account? <a href="sign_in.html">Sign in now</a>
      </div>
    </div>
  </body>
</html>

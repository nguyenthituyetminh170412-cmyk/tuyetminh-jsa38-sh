<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="weather-card p-4 shadow">

        <h2 class="text-center mb-4"> Weather App</h2>

        <input 
            type="text" 
            id="cityInput" 
            class="form-control mb-3"
            placeholder="Nhập tên thành phố"
        >

        <button class="btn btn-primary w-100 mb-3" onclick="getWeatherByCity()">
            Tìm kiếm thành phố
        </button>

        <button class="btn btn-success w-100" onclick="getWeatherByLocation()">
             Dùng vị trí hiện tại
        </button>

        <div id="weatherResult" class="mt-4 text-center"></div>

    </div>
</div>

<script src="du_bao_thoi_tiet.js"></script>
</body>
</html>
